version: 2

sources:
  - name: raw
    description: >
      Raw source tables loaded into DuckDB by the ingest pipeline.
      Includes CMS Open Payments public data and NovaPharma synthetic data.
    schema: main  # DuckDB's default schema

    tables:
      - name: cms_open_payments
        description: >
          CMS Open Payments general payments data (public), 2022-2024.
          Placeholder for DuckDB — not queried locally.
          Queried via Athena target only — use source('athena_raw', 'cms_open_payments').

      - name: synthetic_interactions
        description: >
          Synthetic NovaPharma internal HCP interaction records.
          Generated data — not real. Used to simulate field activity logs.

      - name: synthetic_speaker_programs
        description: >
          Synthetic NovaPharma speaker program event records.
          Generated data — not real. Tracks HCP speaker engagements and fees.

      - name: synthetic_attendees
        description: >
          Synthetic NovaPharma speaker program attendee records.
          Generated data — not real. Tracks attendees per speaker event.

  - name: athena_raw
    description: >
      CMS Open Payments data in AWS Glue Data Catalog.
      Queried via dbt --target athena. Not available in local DuckDB runs.
    database: awsdatacatalog
    schema: compliance_risk_raw
    tables:
      - name: cms_open_payments
        description: >
          CMS Open Payments general payments 2022-2024.
          Partitioned Parquet table in Glue — crawled from
          s3://compliance-risk-investigator/raw/cms_open_payments/.
          Partition columns: year subfolders (2022, 2023, 2024).

  - name: athena_synthetic
    description: Synthetic NovaPharma data in Glue catalog for Athena target.
    database: awsdatacatalog
    schema: compliance_risk_raw
    tables:
      - name: hcp_interactions
      - name: speaker_program_events
      - name: speaker_program_attendees
      - name: hcp_master
        description: Synthetic HCP master with specialty, state, fmv_tier, profile.
