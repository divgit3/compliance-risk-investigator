version: 2

models:
  - name: stg_cms_general_payments
    description: >
      Staged CMS Open Payments general payments (2022-2024).
      Runs via --target athena only. HCP identity fields fully redacted (NULL).
      Company names pseudonymized for 5 target/competitor companies.
    columns:
      - name: record_id
        description: >
          CMS-assigned unique payment record identifier.
          NOTE: NULL for all 2022 partition rows — bigint type mismatch in ingest.
          Not tested for not_null or unique until 2022 data is reprocessed.

      - name: hcp_id
        description: Pseudonymous HCP identifier in HCP_{profile_id} format.
        data_tests:
          - not_null

      - name: program_year
        description: CMS program year (2022, 2023, or 2024). Derived from partition_0 for 2022 rows.
        data_tests:
          - not_null
          - accepted_values:
              values: [2022, 2023, 2024]
              quote: false  # program_year is bigint; prevent varchar IN comparison

      - name: payment_amount
        description: >
          Total payment amount USD.
          NOTE: NULL for many 2022 partition rows — bigint type mismatch in ingest.

      - name: company_name
        description: >
          Pseudonymized company name for 5 companies; real name otherwise.
          NOTE: 39 CMS source rows have no company name — not tested for not_null.

  - name: stg_synthetic_interactions
    description: >
      Synthetic NovaPharma HCP interaction records.
      Pass-through from source — full schema exposed for downstream marts.
    columns:
      - name: interaction_id
        description: Unique identifier for each interaction.
        data_tests:
          - not_null
          - unique

      - name: hcp_id
        description: HCP identifier in HCP_{profile_id} format.
        data_tests:
          - not_null

      - name: interaction_type
        data_tests:
          - not_null
          - accepted_values:
              values: ['meal', 'education', 'consulting', 'advisory_board', 'conference']

      - name: program_year
        data_tests:
          - not_null
          - accepted_values:
              values: [2022, 2023, 2024]

      - name: fmv_tier
        data_tests:
          - accepted_values:
              values: ['local', 'regional', 'national']

      - name: payment_amount
        data_tests:
          - not_null

      - name: violation_severity
        data_tests:
          - not_null
          - accepted_values:
              values: ['none', 'low', 'medium', 'high']

      - name: is_violation
        data_tests:
          - not_null

      - name: synthetic_data_flag
        data_tests:
          - not_null

  - name: stg_synthetic_speaker_programs
    description: >
      Synthetic NovaPharma speaker program event records.
      Also used as source for attendee mart pending Task 1.8 source split.
    columns:
      - name: event_id
        description: Unique identifier for each speaker event.
        data_tests:
          - not_null
          - unique

      - name: speaker_hcp_id
        data_tests:
          - not_null

      - name: program_year
        data_tests:
          - not_null
          - accepted_values:
              values: [2022, 2023, 2024]

      - name: speaker_tier
        data_tests:
          - accepted_values:
              values: ['local', 'regional', 'national']

      - name: venue_type
        data_tests:
          - accepted_values:
              values: ['office', 'hospital', 'hotel', 'restaurant',
                       'entertainment_venue', 'luxury_resort', 'sports_venue']

      - name: violation_severity
        data_tests:
          - not_null
          - accepted_values:
              values: ['none', 'low', 'medium', 'high']

      - name: is_violation
        data_tests:
          - not_null

      - name: synthetic_data_flag
        data_tests:
          - not_null
