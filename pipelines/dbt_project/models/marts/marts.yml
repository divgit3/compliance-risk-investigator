version: 2

models:
  - name: mart_event_features
    description: >
      Phase 2 ML-ready speaker event feature mart. One row per event (5,241 total).
      DuckDB only — sources synthetic speaker program and attendee parquets via S3.
      All business rule thresholds sourced from compliance/rules.json.
      Violation flags excluded — ML input only.
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique

      - name: speaker_hcp_id
        data_tests:
          - not_null

      - name: raw_event_risk_score
        data_tests:
          - not_null

      - name: attendee_count
        data_tests:
          - not_null

      - name: attendees_signed_pct
        data_tests:
          - not_null

  - name: mart_hcp_spend_features
    description: >
      Phase 2 ML-ready external spend feature mart. One row per HCP aggregating
      CMS Open Payments (Nova Pharma / Takeda) signals 2022-2024.
      Athena-only (mart_target_payments dependency). Rep concentration features
      are 0-filled on Athena until synthetic parquet is registered in Glue.
      Violation flags excluded — ML input only, not ground truth.
    columns:
      - name: hcp_id
        data_tests:
          - not_null
          - unique

      - name: has_cms_payments
        data_tests:
          - not_null

      - name: raw_spend_risk_score
        data_tests:
          - not_null

      - name: lifetime_total_spend
        data_tests:
          - not_null

      - name: peak_year_spend
        data_tests:
          - not_null

  - name: mart_target_payments
    description: >
      CMS payments made to HCPs by the target company (Nova Pharma / Takeda).
      Subset of stg_cms_general_payments where is_target = true.
    columns:
      - name: record_id
        description: NULL for 2022 rows (ingest type mismatch) — not tested.

      - name: hcp_id
        data_tests:
          - not_null

  - name: mart_competitor_payments
    description: >
      CMS payments made to HCPs by competitor companies.
      Subset of stg_cms_general_payments where is_competitor = true.
    columns:
      - name: record_id
        description: NULL for 2022 rows (ingest type mismatch) — not tested.

      - name: hcp_id
        data_tests:
          - not_null

  - name: mart_population_payments
    description: >
      CMS payments made to HCPs who also received target company payments.
      Used for population-level benchmarking context.
    columns:
      - name: record_id
        description: NULL for 2022 rows (ingest type mismatch) — not tested.

      - name: hcp_id
        data_tests:
          - not_null

  - name: mart_hcp_interactions_features
    description: >
      Feature mart for HCP interactions.
      Violation flags excluded — used as anomaly detection model input only.
    columns:
      - name: interaction_id
        data_tests:
          - not_null
          - unique

      - name: hcp_id
        data_tests:
          - not_null

      - name: interaction_type
        data_tests:
          - accepted_values:
              values: ['meal', 'education', 'consulting', 'advisory_board', 'conference']

      - name: program_year
        data_tests:
          - accepted_values:
              values: [2022, 2023, 2024]

      - name: payment_amount
        data_tests:
          - not_null

      - name: fmv_tier
        data_tests:
          - accepted_values:
              values: ['local', 'regional', 'national']

  - name: mart_speaker_events_features
    description: >
      Feature mart for speaker program events.
      Violation flags excluded — used as anomaly detection model input only.
    columns:
      - name: event_id
        data_tests:
          - not_null
          - unique

      - name: speaker_hcp_id
        data_tests:
          - not_null

      - name: program_year
        data_tests:
          - accepted_values:
              values: [2022, 2023, 2024]

      - name: speaker_tier
        data_tests:
          - accepted_values:
              values: ['local', 'regional', 'national']

      - name: venue_type
        data_tests:
          - accepted_values:
              values: ['office', 'hospital', 'hotel', 'restaurant',
                       'entertainment_venue', 'luxury_resort', 'sports_venue']

  - name: mart_attendees_features
    description: >
      Feature mart for speaker program attendees.
      Violation flags excluded.
      NOTE: Currently sourced from stg_synthetic_speaker_programs.
      Full attendee tests added in Task 1.8 after source split.
    columns:
      - name: program_year
        data_tests:
          - accepted_values:
              values: [2022, 2023, 2024]

  - name: mart_violation_ground_truth
    description: >
      Ground truth mart — violation flags only.
      Used EXCLUSIVELY for Phase 2 model validation. Never as model input.
    columns:
      - name: record_id
        data_tests:
          - not_null

      - name: hcp_id
        data_tests:
          - not_null

      - name: record_type
        data_tests:
          - not_null
          - accepted_values:
              values: ['interaction', 'speaker_event']

      - name: violation_severity
        data_tests:
          - not_null
          - accepted_values:
              values: ['none', 'low', 'medium', 'high']

      - name: is_violation
        data_tests:
          - not_null
